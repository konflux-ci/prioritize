---
jira:
  # url: https://issues.redhat.com
  project-id: KONFLUX
  subquery: filter!=106098
comments:
  footer: >
    {color:#505f79}See also
    [konflux.yaml|https://github.com/konflux-ci/prioritize/blob/main/config/konflux.yaml],
    the [source code|https://github.com/konflux-ci/prioritize], and the
    [runner|https://gitlab.cee.redhat.com/rbean/jira-automation/-/blob/main/.gitlab-ci.yml]
    for this bot.{color}
program_automation:
  issues:
    Feature:
      # collector: get_issues
      rules:
        - check_target_end_date
    Outcome:
      # collector: get_issues
      rules:
        - check_components
        - check_target_end_date
team_automation:
  issues:
    Feature:
      # collector: get_issues
      rules:
        - check_due_date_by_fixversion
      group_rules:
        - rule: check_timesensitive_rank
          kwargs:
            manual_override: >
              components.exists(c, c in [
                "Governance", "CentOS Stream", "RHEL Process", "RPM Storage",
                "RPM Release", "RPM Package Integration", "RPM Delivery",
                "RPM Build", "RoK Team Transition", "RoK Migration"
              ])

        - rule: check_priority_from_rank_by_component
          kwargs:
            ignore: ["user-origin"]
    Epic:
      collector: get_child_issues
      rules:
        - rule: check_due_date
          kwargs:
            # This is a CEL expression
            ignore: >
              .key.startsWith("MMENG-")
              || .key.startsWith("NCL-")
              || .key.startsWith("DESKTOP-")
              || .key.startsWith("JBS-")
              || .key.startsWith("SPRHEL-")
              || .key.startsWith("SPMM-")
              || .key.startsWith("HUM-")
